<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"
    />
    <title>ORC Map Editor</title>
    <link rel="stylesheet" href="/src/ui/styles.css" />
  </head>
  <body>
    <div id="app">
      <header id="toolbar">
        <div class="toolbar-group">
          <button
            id="btn-toggle-sidebar"
            class="tool-btn"
            title="Toggle Sidebar"
          >
            ☰
          </button>

          <button class="tool-btn" data-tool="LINE" title="Line (1)">✏️</button>
          <button class="tool-btn" data-tool="NGON" title="N-Gon (3)">⬡</button>
          <button class="tool-btn" data-tool="ZOOM" title="Zoom (4)">🔍</button>
          <button class="tool-btn" data-tool="DRAG" title="Drag/Select (5)">
            ✋
          </button>
          <button class="tool-btn" data-tool="ENTITY" title="Entity">★</button>
        </div>
        <div class="toolbar-group">
          <label class="inline-field">
            Sides
            <input id="ngon-sides" type="number" min="3" max="12" value="8" />
          </label>
        </div>
        <div class="toolbar-group">
          <button id="btn-undo" class="action-btn">↶ Undo</button>
          <button id="btn-redo" class="action-btn">↷ Redo</button>
          <button id="btn-rotate" class="action-btn">⟳ Rotate</button>
          <button id="btn-delete" class="action-btn dest-btn">✖ Delete</button>
          <button id="btn-toggle-triangles" class="action-btn">
            📐 Triangles: Off
          </button>
        </div>
        <div class="toolbar-group">
          <button id="btn-export" class="action-btn">⬇ Export ZIP</button>
          <button id="btn-import" class="action-btn">⬆ Import JSON</button>
          <input id="file-import" type="file" accept=".json" hidden />
          <button id="btn-settings" class="action-btn">⚙ Bindings</button>
        </div>
      </header>

      <aside id="sidebar">
        <div class="panel-title">Campaign</div>
        <div id="level-list"></div>
        <button id="btn-new-level" class="action-btn">+ New Level</button>
        <button class="action-btn" id="btn-import-workspace">
          📂 Import .ZIP
        </button>
        <input
          type="file"
          id="file-import-input"
          accept=".zip"
          style="display: none"
        />

        <div id="dynamic-properties-panel" class="hidden">
          <div class="panel-title">Inspector</div>
          <div id="panel-content"></div>
        </div>
      </aside>

      <main id="canvas-host"></main>

      <div id="settings-modal" class="modal hidden">
        <div class="modal-panel">
          <div class="modal-header">
            <div class="panel-title">Key Bindings</div>
            <button id="close-settings" class="action-btn">✖</button>
          </div>
          <div id="bindings-container"></div>
          <button id="btn-reset-bindings" class="action-btn">
            Reset to defaults
          </button>
        </div>
      </div>
    </div>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
